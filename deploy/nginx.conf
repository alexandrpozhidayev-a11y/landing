# /etc/nginx/sites-available/data-center-valley.com
#
# Static landing page — no PHP/backend needed, nginx just serves files.
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/data-center-valley.com
#   sudo ln -s /etc/nginx/sites-available/data-center-valley.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d data-center-valley.com -d www.data-center-valley.com
#
# certbot will rewrite the server{} blocks below automatically once the
# certificate is issued (adds ssl_certificate lines, sets up the HTTP->HTTPS
# redirect). The manual ssl_certificate paths here are what it will produce —
# safe to leave in place if you already have the cert, otherwise run certbot
# first with just the HTTP block active.

# Redirect www -> apex (adjust if you prefer the opposite)
server {
    listen 80;
    listen [::]:80;
    server_name www.data-center-valley.com;
    return 301 $scheme://data-center-valley.com$request_uri;
}

# HTTP: ACME challenge + redirect everything else to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name data-center-valley.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name data-center-valley.com;

    root /var/www/landing;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/data-center-valley.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/data-center-valley.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Deploying via `git clone` straight into the webroot means .git/ and this
    # deploy/ folder are physically inside /var/www/landing — block them so
    # nginx doesn't serve the repo history or this config file to visitors.
    location ~ /\.git {
        deny all;
        return 404;
    }

    location ^~ /deploy/ {
        deny all;
        return 404;
    }

    # HTML: always revalidate so deploys show up immediately
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # CSS/JS: filenames don't change between deploys, so no long-lived cache —
    # always revalidate with the server instead of going stale for days.
    location ~* \.(?:css|js)$ {
        add_header Cache-Control "no-cache";
    }

    # Fonts/images: these basically never change, safe to cache hard.
    location ~* \.(?:woff2?|png|jpe?g|svg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
