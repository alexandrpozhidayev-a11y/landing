# Temporary HTTP-only config — use this FIRST, before a certificate exists.
# Once certbot has issued the cert, switch to nginx.conf (the HTTPS version)
# and reload. See deploy/README.md for the full sequence.

server {
    listen 80;
    listen [::]:80;
    server_name data-center-valley.com www.data-center-valley.com;

    root /var/www/landing;
    index index.html;

    location ~ /\.git {
        deny all;
        return 404;
    }

    location ^~ /deploy/ {
        deny all;
        return 404;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
